name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — tests + lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: cd backend && ruff check .

      - name: Format check (ruff)
        run: cd backend && ruff format --check .

      - name: Tests (pytest)
        env:
          PYTHONPATH: backend
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key
          CLERK_PUBLISHABLE_KEY: pk_test_ci
          CLERK_SECRET_KEY: sk_test_ci
        run: pytest backend/tests -v

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8010
          # Clerk publishable key is intentionally public (pk_test_* = safe to expose)
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_aW50ZXJuYWwtbXVkZmlzaC05OS5jbGVyay5hY2NvdW50cy5kZXYk
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /clients
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
        run: cd frontend && npm run build
